flush ruleset

define ext_if = ens33
define ext_ip = 192.168.0.8
define cloudflare  = { 
	173.245.48.0/20,        
	103.21.244.0/22,        
	103.22.200.0/22,        
	103.31.4.0/22,          
	141.101.64.0/18,        
	108.162.192.0/18,       
	190.93.240.0/20,        
	188.114.96.0/20,        
	197.234.240.0/22,       
	198.41.128.0/17,        
	162.158.0.0/15,         
	104.16.0.0/12,          
	172.64.0.0/13,          
	131.0.72.0/22 
}

table ip filter {

	chain input {
		type filter hook input priority 0; policy drop;
		ct state { established, related } accept
		ct state invalid drop
		iif lo accept
		iif != lo ip daddr 127.0.0.1/8 drop
		iif $ext_if ip saddr 192.168.0.2 ip daddr $ext_ip tcp dport 755 accept
		iif $ext_if ip saddr 192.168.0.2 ip daddr $ext_ip udp dport 644 accept
		iif wg0 ip saddr 10.0.0.2 ip daddr 10.0.0.1 tcp dport 755 accept
		iif $ext_if ip daddr $ext_ip tcp dport { 9001, 9030 } accept
		iif $ext_if ip saddr $cloudflare ip daddr $ext_ip tcp dport 443 accept
	}

	chain forward {
		type filter hook forward priority 0; policy drop;
		ct state { established, related } accept
		ct state invalid drop
		iifname wg0 oifname $ext_if accept
	}

	chain output {
		type filter hook output priority 0; policy drop;
		ct state { established, related } accept
		ct state invalid drop
		oif lo accept
		oif $ext_if ip saddr $ext_ip accept
	}
}

table ip nat {

	chain prerouting {
		type nat hook prerouting priority 0;
	}

	chain postrouting {
		type nat hook postrouting priority 100;
		oif $ext_if ip saddr 10.0.0.0/24 masquerade
	}
}
